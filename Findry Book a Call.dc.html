<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="../exports/png/findry-favicon-32.png">
<script src="./i18n.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #F6F7F9; }
  ::selection { background: #12A594; color: #fff; }
  .fd-prose { font-family: system-ui, "Segoe UI", "Helvetica Neue", sans-serif; }
  a { text-decoration: none; color: inherit; }
  .fd-field { font-family: system-ui, sans-serif; font-size: 15px; color:#0E2138; width:100%; padding:13px 15px; border:1px solid #D7DAE0; border-radius:10px; background:#fff; outline:none; transition:border-color .15s, box-shadow .15s; }
  .fd-field:focus { border-color:#12A594; box-shadow:0 0 0 3px rgba(18,165,148,0.15); }
  .fd-field::placeholder { color:#A6ADBA; }
  [dir="rtl"] { font-family: 'Noto Naskh Arabic', 'Noto Sans Arabic', sans-serif !important; }
  [dir="rtl"] .fd-prose, [dir="rtl"] .fd-field { font-family: 'Noto Naskh Arabic', 'Noto Sans Arabic', sans-serif !important; }
  [dir="rtl"] .fd-h { font-family: 'Noto Nastaliq Urdu', serif !important; line-height: 1.9 !important; }
  .fd-num { unicode-bidi: isolate; }
  [dir="rtl"] .fd-num { font-family: 'Space Grotesk', sans-serif !important; direction: ltr; unicode-bidi: isolate; }
</style>
</helmet>

<div dir="{{ dir }}" lang="{{ lang }}" style="font-family:'Space Grotesk',sans-serif; color:#0E2138; background:#F6F7F9; min-height:100vh; display:flex; flex-direction:column;">

  <!-- MINIMAL NAV -->
  <header style="background:#fff; border-bottom:1px solid #EAEBEE;">
    <nav style="max-width:1080px; margin:0 auto; padding:16px 40px; display:flex; align-items:center; justify-content:space-between;">
      <a href="Findry Home.dc.html" style="display:flex; align-items:center; gap:11px;">
        <svg viewBox="0 0 120 120" width="30" height="30" style="display:block; flex-shrink:0;"><rect x="34" y="18" width="16" height="16" rx="3.5" fill="#0E2138"></rect><rect x="34" y="36" width="16" height="16" rx="3.5" fill="#0E2138"></rect><rect x="34" y="54" width="16" height="16" rx="3.5" fill="#0E2138"></rect><rect x="34" y="72" width="16" height="16" rx="3.5" fill="#0E2138"></rect><rect x="34" y="90" width="16" height="16" rx="3.5" fill="#0E2138"></rect><rect x="52" y="18" width="16" height="16" rx="3.5" fill="#0E2138"></rect><rect x="70" y="18" width="16" height="16" rx="3.5" fill="#12A594"></rect><rect x="52" y="54" width="16" height="16" rx="3.5" fill="#0E2138"></rect></svg>
        <span class="fd-num" style="font-family:'Space Grotesk',sans-serif; font-weight:600; letter-spacing:-0.03em; font-size:22px; color:#0E2138;">F<span style="position:relative; display:inline-block;">ı<span style="position:absolute; left:50%; transform:translateX(calc(-50% + 0.02em)); top:0.30em; width:0.155em; height:0.155em; background:#0E2138; border-radius:0.034em;"></span></span>ndry</span>
      </a>
      <div style="display:flex; align-items:center; gap:18px;">
        <div style="display:flex; align-items:center; background:#F1F2F4; border-radius:999px; padding:3px;">
          <button onClick="{{ setEn }}" style="{{ enStyle }}">EN</button>
          <button onClick="{{ setUr }}" style="{{ urStyle }}">اردو</button>
        </div>
        <a href="Findry Home.dc.html" class="fd-h" style="font-size:14px; color:#8A93A3;" style-hover="color:#12A594;">{{ t.back }}</a>
      </div>
    </nav>
  </header>

  <main style="flex:1; padding:56px 0 80px;">
    <div style="max-width:1080px; margin:0 auto; padding:0 40px;">
      <div style="max-width:600px;">
        <span class="fd-h" style="display:inline-block; font-size:12px; font-weight:600; letter-spacing:0.08em; color:#12A594; background:#E2F4F1; padding:7px 13px; border-radius:999px; white-space:nowrap;">{{ t.eyebrow }}</span>
        <h1 class="fd-h" style="margin:20px 0 0; font-size:44px; line-height:1.06; font-weight:700; letter-spacing:-0.03em;">{{ t.headline }}</h1>
        <p class="fd-prose" style="margin:16px 0 0; font-size:17px; line-height:1.6; color:#5C6470;">{{ t.sub }}</p>
      </div>

      <div style="margin-top:40px; display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start;">

        <sc-if value="{{ notSubmitted }}" hint-placeholder-val="{{ true }}">
        <div style="background:#fff; border:1px solid #E4E5E8; border-radius:20px; padding:34px; box-shadow:0 1px 3px rgba(15,18,25,0.04);">
          <h2 class="fd-h" style="margin:0 0 22px; font-size:20px; font-weight:600;">{{ t.formTitle }}</h2>
          <div style="display:flex; flex-direction:column; gap:16px;">
            <div><label class="fd-prose" style="display:block; font-size:13px; font-weight:600; color:#3A4150; margin-bottom:7px;">{{ t.fName }}</label><input class="fd-field" placeholder="{{ t.pName }}"></div>
            <div><label class="fd-prose" style="display:block; font-size:13px; font-weight:600; color:#3A4150; margin-bottom:7px;">{{ t.fBiz }}</label><input class="fd-field" placeholder="{{ t.pBiz }}"></div>
            <div style="display:flex; gap:14px;">
              <div style="flex:1;"><label class="fd-prose" style="display:block; font-size:13px; font-weight:600; color:#3A4150; margin-bottom:7px;">{{ t.fCity }}</label><input class="fd-field" placeholder="{{ t.pCity }}"></div>
              <div style="flex:1;"><label class="fd-prose" style="display:block; font-size:13px; font-weight:600; color:#3A4150; margin-bottom:7px;">{{ t.fWeb }}</label><input class="fd-field" placeholder="findry.co"></div>
            </div>
            <div><label class="fd-prose" style="display:block; font-size:13px; font-weight:600; color:#3A4150; margin-bottom:7px;">{{ t.fHelp }}</label><textarea class="fd-field" rows="3" style="resize:vertical;" placeholder="{{ t.pHelp }}"></textarea></div>
            <button onClick="{{ submit }}" class="fd-h" style="margin-top:4px; font-size:15.5px; font-weight:600; color:#fff; background:#0E2138; border:none; cursor:pointer; padding:15px; border-radius:10px;" style-hover="background:#16304f;">{{ t.formCta }}</button>
            <p class="fd-prose" style="margin:2px 0 0; font-size:12.5px; color:#8A93A3; text-align:center;">{{ t.reassure }}</p>
          </div>
        </div>
        </sc-if>

        <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
        <div style="background:#fff; border:1px solid #E4E5E8; border-radius:20px; padding:40px 34px; box-shadow:0 1px 3px rgba(15,18,25,0.04); text-align:center;">
          <div style="width:56px; height:56px; border-radius:999px; background:#E2F4F1; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;"><span style="color:#12A594; font-size:26px;">✓</span></div>
          <h2 class="fd-h" style="margin:0; font-size:22px; font-weight:600;">{{ t.doneTitle }}</h2>
          <p class="fd-prose" style="margin:12px auto 0; font-size:15.5px; line-height:1.6; color:#5C6470; max-width:36ch;">{{ t.doneBody }}</p>
          <button onClick="{{ reset }}" class="fd-prose" style="margin-top:20px; background:none; border:none; color:#12A594; font-size:14px; font-weight:600; cursor:pointer;">{{ t.edit }}</button>
        </div>
        </sc-if>

        <!-- CALENDAR -->
        <div style="background:#fff; border:1px solid #E4E5E8; border-radius:20px; padding:34px; box-shadow:0 1px 3px rgba(15,18,25,0.04);">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
            <h2 class="fd-h" style="margin:0; font-size:20px; font-weight:600;">{{ t.pickTime }}</h2>
            <span class="fd-prose" style="font-size:12px; color:#8A93A3;">{{ t.tz }}</span>
          </div>
          <div class="fd-prose" style="font-size:13.5px; color:#8A93A3; margin-bottom:20px;">{{ t.month }}</div>
          <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:22px;" dir="ltr">
            <sc-for list="{{ dows }}" as="d" hint-placeholder-count="7">
              <div class="fd-prose" style="text-align:center; font-size:11px; color:#A6ADBA; font-weight:600;">{{ d }}</div>
            </sc-for>
            <sc-for list="{{ days }}" as="d" hint-placeholder-count="30">
              <div class="fd-num" style="{{ d.style }}">{{ d.n }}</div>
            </sc-for>
          </div>
          <div class="fd-prose" style="font-size:13px; font-weight:600; color:#3A4150; margin-bottom:12px;">{{ t.avail }}</div>
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;" dir="ltr">
            <sc-for list="{{ slots }}" as="s" hint-placeholder-count="6">
              <button onClick="{{ s.pick }}" class="fd-num" style="{{ s.style }}">{{ s.label }}</button>
            </sc-for>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer style="background:#0E1116; color:#fff; padding:30px 0;">
    <div style="max-width:1080px; margin:0 auto; padding:0 40px; display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; align-items:center;">
      <span class="fd-prose" style="font-size:13px; color:#6B7486;"><span class="fd-num" style="font-family:'Space Grotesk',sans-serif;">© 2026 Findry · findry.co</span> · {{ t.cityLine }}</span>
      <div style="display:flex; gap:24px;">
        <a href="Findry Privacy.dc.html" class="fd-h" style="font-size:13px; color:#6B7486;" style-hover="color:#C4CBD6;">{{ t.privacy }}</a>
        <a href="Findry Terms.dc.html" class="fd-h" style="font-size:13px; color:#6B7486;" style-hover="color:#C4CBD6;">{{ t.terms }}</a>
      </div>
    </div>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = {
    submitted: false, slot: '11:30',
    lang: (() => { try { return localStorage.getItem('findry-lang') || 'en'; } catch (e) { return 'en'; } })()
  };

  T = {
    en: {
      back: '← Back to site', eyebrow: 'BOOK A CALL', headline: "Let's see if we can get you ranking.",
      sub: 'A free, no-obligation call — about 20 minutes. Tell us a little about your business and pick a time that works.',
      formTitle: 'A few quick details', fName: 'Your name', pName: 'e.g. Ayesha Khan', fBiz: 'Business name', pBiz: 'e.g. Karachi Grill House',
      fCity: 'City / area', pCity: 'e.g. Clifton, Karachi', fWeb: 'Website (if any)', fHelp: 'What do you want help with?', pHelp: "e.g. We're not showing up when people search for us nearby.",
      formCta: 'Continue to pick a time', reassure: 'Free · no obligation · ~20 minutes',
      doneTitle: 'Details received.', doneBody: "Now pick a time on the right that suits you. You'll get a confirmation and a reminder by email.", edit: '← Edit details',
      pickTime: 'Pick a time', tz: 'PKT · 20 min', month: 'June 2026', avail: 'Available · Wed 17 June',
      dows: ['M', 'T', 'W', 'T', 'F', 'S', 'S'], cityLine: 'Karachi, Pakistan', privacy: 'Privacy', terms: 'Terms'
    },
    ur: {
      back: '← سائٹ پر واپس', eyebrow: 'کال بُک کریں', headline: 'دیکھتے ہیں کہ ہم آپ کو نمایاں کر سکتے ہیں۔',
      sub: 'ایک مفت، بلا پابندی کال — تقریباً 20 منٹ۔ اپنے کاروبار کے بارے میں کچھ بتائیں اور مناسب وقت چنیں۔',
      formTitle: 'چند مختصر تفصیلات', fName: 'آپ کا نام', pName: 'مثلاً عائشہ خان', fBiz: 'کاروبار کا نام', pBiz: 'مثلاً Karachi Grill House',
      fCity: 'شہر / علاقہ', pCity: 'مثلاً کلفٹن، کراچی', fWeb: 'ویب سائٹ (اگر ہو)', fHelp: 'آپ کس چیز میں مدد چاہتے ہیں؟', pHelp: 'مثلاً جب لوگ ہمیں قریب میں تلاش کرتے ہیں تو ہم نظر نہیں آتے۔',
      formCta: 'وقت چننے کے لیے آگے بڑھیں', reassure: 'مفت · بلا پابندی · تقریباً 20 منٹ',
      doneTitle: 'تفصیلات موصول ہو گئیں۔', doneBody: 'اب دائیں جانب اپنی پسند کا وقت چنیں۔ آپ کو ای میل پر تصدیق اور یاد دہانی مل جائے گی۔', edit: '← تفصیلات میں ترمیم',
      pickTime: 'وقت چنیں', tz: 'PKT · 20 منٹ', month: 'جون 2026', avail: 'دستیاب · بدھ 17 جون',
      dows: ['پیر', 'منگل', 'بدھ', 'جمعرات', 'جمعہ', 'ہفتہ', 'اتوار'], cityLine: 'کراچی، پاکستان', privacy: 'پرائیویسی', terms: 'شرائط'
    }
  };

  setLang(lang) { if (window.FindryI18n) window.FindryI18n.setLang(lang); this.setState({ lang }); }

  renderVals() {
    const lang = this.state.lang;
    const t = this.T[lang] || this.T.en;
    const isUr = lang === 'ur';
    const langBtn = { border: 'none', cursor: 'pointer', fontSize: '12.5px', fontWeight: 600, padding: '6px 13px', borderRadius: '999px', transition: 'all .2s' };
    const slotBase = { fontFamily: 'system-ui, sans-serif', fontSize: '13.5px', fontWeight: 600, cursor: 'pointer', padding: '11px 0', borderRadius: '9px', transition: 'all .15s' };
    const times = ['10:00', '10:30', '11:30', '13:00', '14:30', '16:00'];
    const avail = [16, 17, 18, 19, 23, 24, 25];
    const days = [];
    for (let n = 1; n <= 30; n++) {
      const sel = n === 17, av = avail.includes(n);
      days.push({ n, style: { fontFamily: 'system-ui, sans-serif', textAlign: 'center', fontSize: '13px', padding: '9px 0', borderRadius: '8px', color: sel ? '#fff' : av ? '#0E2138' : '#C2C7CF', fontWeight: sel ? 700 : av ? 600 : 400, background: sel ? '#12A594' : av ? '#E2F4F1' : 'transparent', cursor: av ? 'pointer' : 'default' } });
    }
    return {
      t, dir: isUr ? 'rtl' : 'ltr', lang,
      setEn: () => this.setLang('en'), setUr: () => this.setLang('ur'),
      enStyle: !isUr ? { ...langBtn, background: '#fff', color: '#0E2138', boxShadow: '0 1px 2px rgba(14,33,56,0.12)' } : { ...langBtn, background: 'transparent', color: '#6A7180' },
      urStyle: isUr ? { ...langBtn, background: '#fff', color: '#0E2138', boxShadow: '0 1px 2px rgba(14,33,56,0.12)', fontFamily: "'Noto Naskh Arabic', sans-serif" } : { ...langBtn, background: 'transparent', color: '#6A7180', fontFamily: "'Noto Naskh Arabic', sans-serif" },
      dows: t.dows, days,
      notSubmitted: !this.state.submitted, submitted: this.state.submitted,
      submit: () => this.setState({ submitted: true }), reset: () => this.setState({ submitted: false }),
      slots: times.map((tm) => ({ label: tm, pick: () => this.setState({ slot: tm }), style: tm === this.state.slot ? { ...slotBase, background: '#0E2138', color: '#fff', border: '1px solid #0E2138' } : { ...slotBase, background: '#fff', color: '#3A4150', border: '1px solid #D7DAE0' } }))
    };
  }

  componentDidMount() {
    if (window.FindryI18n) { window.FindryI18n.applyDoc(this.state.lang); if (this.state.lang === 'ur') window.FindryI18n.ensureUrduFonts(); }
  }
}
</script>
</body>
</html>
